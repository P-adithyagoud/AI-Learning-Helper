<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Learning Planner{% endblock %}</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "hsl(240 10% 3.9%)",
                        foreground: "hsl(0 0% 98%)",
                        card: "hsl(240 10% 4.5%)",
                        "card-foreground": "hsl(0 0% 98%)",
                        muted: "hsl(240 3.7% 15.9%)",
                        "muted-foreground": "hsl(240 5% 64.9%)",
                        gold: {
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                        },
                    },
                    borderRadius: {
                        xl: "1rem",
                        "2xl": "1.5rem",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .ri-arrow { transition: transform 0.3s ease; }
        .resource-item:hover .ri-arrow { transform: translate(4px, -4px); }
        input[type="range"] { accent-color: #f59e0b; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="flex min-h-screen bg-background">

    <!-- SIDEBAR -->
    <aside class="w-64 h-screen fixed left-0 top-0 border-r border-white/5 bg-background flex flex-col p-6 z-50">
        <div class="flex items-center gap-2 px-2 mb-10">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center shadow-lg shadow-gold-500/20">
                <svg class="w-5 h-5 text-black" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            </div>
            <span class="font-bold tracking-tight text-xl">AI Planner</span>
        </div>

        <nav class="flex-1 flex flex-col gap-2">
            <a href="/" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all duration-200 {% if active_page == 'home' %}bg-white/10 text-white shadow-lg{% else %}text-muted-foreground hover:text-white hover:bg-white/5{% endif %}">
                <svg class="w-5 h-5 {% if active_page == 'home' %}text-gold-400{% endif %}" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                <span class="font-medium text-sm">Dashboard</span>
            </a>
            <a href="#" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl transition-all duration-200 text-muted-foreground hover:text-white hover:bg-white/5">
                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
                <span class="font-medium text-sm">Explore</span>
            </a>
        </nav>

        <div class="pt-6 border-t border-white/5 flex flex-col gap-2">
            <a href="#" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl text-muted-foreground hover:text-white"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg><span class="text-sm">Settings</span></a>
            <a href="/login" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl text-muted-foreground hover:text-red-400"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg><span class="text-sm">Log out</span></a>
        </div>
    </aside>

    <!-- CONTENT WRAPPER -->
    <div class="flex-1 ml-64 min-h-screen">
        {% block content %}{% endblock %}
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loading-overlay" class="fixed inset-0 z-[100] bg-background/80 backdrop-blur-md items-center justify-center hidden">
        <div class="flex flex-col items-center">
            <div class="relative">
                <div class="w-20 h-20 rounded-full border-t-2 border-gold-400 animate-spin"></div>
            </div>
            <p id="loading-text" class="mt-12 text-lg font-medium text-gold-400 italic animate-pulse">Finding best playlists...</p>
        </div>
    </div>

    <script>
        const loadingTexts = [
            "Ranking by structure...",
            "Calculating efficiency...",
            "Optimizing for your schedule...",
            "Finalizing your master roadmap..."
        ];
        function showLoading() {
            const overlay = document.getElementById('loading-overlay');
            const textEl = document.getElementById('loading-text');
            overlay.style.display = 'flex';
            let step = 0;
            setInterval(() => {
                step = (step + 1) % loadingTexts.length;
                textEl.innerText = loadingTexts[step];
            }, 1500);
        }
    </script>
</body>
</html>
